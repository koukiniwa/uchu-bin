name: 記事自動公開

on:
  schedule:
    # 月・火・木・土 の 朝5時JST（UTC 20:00 前日）
    - cron: '0 20 * * 0,1,3,5'
  workflow_dispatch: # 手動実行ボタン

jobs:
  auto-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 依存パッケージをインストール
        run: npm install

      - name: 当日記事の重複チェック
        id: check
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          if ls posts/${DATE}-* 2>/dev/null | head -1 | grep -q .; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "本日($DATE)の記事は既に公開済みです。スキップします。"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 記事を生成して公開
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: node scripts/generate-news.js --force --auto-publish

      - name: git push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "宇宙便 Bot"
          git config user.email "bot@uchu-bin.jp"
          git add posts/
          git diff --cached --quiet || git commit -m "記事自動公開 $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
          git push

      - name: Vercelデプロイ待機（3分）
        if: steps.check.outputs.skip == 'false'
        run: sleep 180

      - name: Twitterに投稿
        if: steps.check.outputs.skip == 'false'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: node scripts/tweet-latest-post.js
