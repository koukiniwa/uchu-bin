name: 打ち上げ結果記事

on:
  schedule:
    - cron: '30 */2 * * *'  # 2時間ごと（毎時30分）
  workflow_dispatch:

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install

      - name: 打ち上げ結果チェック
        id: check
        run: node scripts/check-launch-results.js

      - name: 記事を生成
        if: steps.check.outputs.found == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LAUNCH_ROCKET: ${{ steps.check.outputs.rocket }}
          LAUNCH_MISSION: ${{ steps.check.outputs.mission }}
          LAUNCH_STATUS: ${{ steps.check.outputs.status }}
          LAUNCH_PROVIDER: ${{ steps.check.outputs.provider }}
          LAUNCH_PAD: ${{ steps.check.outputs.pad }}
          LAUNCH_DATE: ${{ steps.check.outputs.launch_date }}
          LAUNCH_MISSION_DESC: ${{ steps.check.outputs.mission_desc }}
          LAUNCH_ARTICLE_PROMPT: ${{ steps.check.outputs.article_prompt }}
          LAUNCH_ARTICLE_WORDS: ${{ steps.check.outputs.article_words }}
        run: node scripts/generate-news.js --force --auto-publish --launch-article

      - name: 打ち上げ予定を更新
        if: steps.check.outputs.found == 'true'
        run: node scripts/fetch-launches.js

      - name: git push
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "宇宙便 Bot"
          git config user.email "bot@uchu-bin.jp"
          git add posts/ public/data/ public/feed.xml public/images/
          git diff --cached --quiet || git commit -m "打ち上げ記事自動公開: ${{ steps.check.outputs.rocket }} - ${{ steps.check.outputs.mission }}"
          git push

      - name: Vercelデプロイ待機（3分）
        if: steps.check.outputs.found == 'true'
        run: sleep 180

      - name: ツイート時間帯チェック（JST 7:00-23:00のみ）
        if: steps.check.outputs.found == 'true'
        id: tweet_time
        run: |
          JST_HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$JST_HOUR" -ge 7 ] && [ "$JST_HOUR" -lt 23 ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "JST ${JST_HOUR}時: ツイート可能な時間帯です"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "JST ${JST_HOUR}時: 深夜のためツイートをスキップします"
          fi

      - name: Twitterに投稿
        if: steps.check.outputs.found == 'true' && steps.tweet_time.outputs.ok == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: node scripts/tweet-latest-post.js
